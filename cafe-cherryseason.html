<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe Cherry Season — Panel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FDF6F0; font-family: 'Lato', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const PUNTOS = [
  "Valle Escondido (Casa Central)",
  "Barrio Jardin",
  "Canitas / Valle del Golf / Causana",
  "Camino a San Carlos",
  "Centro (Bonafide Colon y Canada)",
  "Cerro de las Rosas / Urca",
  "Cofico",
  "Docta",
  "Intercountry (El Bosque)",
  "J. Claret / P. Lugones",
  "La Cuesta / La Calera",
  "Manantiales",
  "Montecristo",
  "Nueva Cordoba (Strobel Panaderia / Cafe)",
  "Orfeo / Dino",
  "Sierras Chicas - Rio Ceballos / Salsipuedes",
  "Siete Soles / Tejas 3",
  "V. Rivera Indarte / Saldan",
  "Villa Allende / Mendiolaza",
  "Villa Allende - Av. Padre Luchesse / Ruta E53",
  "Villa Belgrano",
];

const PRODS = [
  { id:"peru250",      nombre:"Peru Blend 250gr",         tipo:"grano",   costoValle:15791, precioMino:23000, precioMayo:19320, ganMino:7209,  ganMayo:3529, minimo:1 },
  { id:"colombia250",  nombre:"Colombia El Tambo 250gr",  tipo:"grano",   costoValle:20873, precioMino:26500, precioMayo:22260, ganMino:5627,  ganMayo:1387, minimo:1 },
  { id:"guatemala250", nombre:"Guatemala Anaer. 250gr",   tipo:"grano",   costoValle:21054, precioMino:30000, precioMayo:25200, ganMino:8946,  ganMayo:4146, minimo:1 },
  { id:"peru1kg",      nombre:"Peru Blend 1kg",           tipo:"grano",   costoValle:39780, precioMino:52100, precioMayo:46369, ganMino:12320, ganMayo:6589, minimo:1 },
  { id:"capscolombia", nombre:"Capsulas Colombia x10",    tipo:"capsula", costoValle:13260, precioMino:18000, precioMayo:14760, ganMino:4740,  ganMayo:1500, minimo:6 },
  { id:"capsperu",     nombre:"Capsulas Peru Blend x10",  tipo:"capsula", costoValle:13260, precioMino:18000, precioMayo:14760, ganMino:4740,  ganMayo:1500, minimo:6 },
];

const SK = "cafe_cs_v1";
const ld = () => { try { const r=localStorage.getItem(SK); if(r) return JSON.parse(r); } catch{} return []; };
const sd = d => { try { localStorage.setItem(SK,JSON.stringify(d)); } catch{} };
const fmt = n => "$"+Math.round(n).toLocaleString("es-AR");

const C = {
  rojo:"#C0392B", rojoLight:"#E8C5C0", rojoBg:"#FDE8EC",
  marron:"#5C3340", marronLight:"#8B6070",
  verde:"#7BAE84", naranja:"#D4845A",
  bg:"#FDF6F0", card:"#FFFFFF", border:"#F0D0D8"
};

function getSem() {
  const d = new Date();
  const day = d.getDay();
  const diff = day===0 ? -6 : 1-day;
  const lun = new Date(d); lun.setDate(d.getDate()+diff);
  const dom = new Date(lun); dom.setDate(lun.getDate()+6);
  const f = x => x.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});
  return "Pedido semanal "+f(lun)+" - "+f(dom);
}

function App() {
  const [pedidos, setPedidos] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({punto:PUNTOS[0], cantidades:{}});
  const [toast, setToast] = useState(null);
  const [vistaStock, setVistaStock] = useState(false);
  const [stock, setStock] = useState({peru250:0,colombia250:0,guatemala250:0,peru1kg:0,capscolombia:0,capsperu:0});

  useEffect(() => { setPedidos(ld()); }, []);
  useEffect(() => { sd(pedidos); }, [pedidos]);

  const showT = (msg, ok=true) => { setToast({msg,ok}); setTimeout(()=>setToast(null),2500); };
  const sem = getSem();
  const pedSem = pedidos.filter(p => p.semana===sem);
  const esValle = form.punto.toLowerCase().includes("valle escondido");

  const consolid = {};
  PRODS.forEach(p => { consolid[p.id] = pedSem.reduce((a,ped)=>a+(ped.cantidades[p.id]||0),0); });

  const ganSem = pedSem
    .filter(p => !p.punto.toLowerCase().includes("valle escondido"))
    .reduce((a,p) => a+PRODS.reduce((b,prod)=>b+(prod.ganMayo*(p.cantidades[prod.id]||0)),0), 0);

  const invValle = pedSem
    .filter(p => p.punto.toLowerCase().includes("valle escondido"))
    .reduce((a,p) => a+PRODS.reduce((b,prod)=>b+(prod.costoValle*(p.cantidades[prod.id]||0)),0), 0);

  const setCant = (id, delta) => {
    const prev = form.cantidades[id]||0;
    setForm(f => ({...f, cantidades:{...f.cantidades,[id]:Math.max(0,prev+delta)}}));
  };

  const agregar = () => {
    const total = PRODS.reduce((a,p)=>a+(form.cantidades[p.id]||0),0);
    if(total===0){ showT("Ingresa al menos un producto",false); return; }
    const caps = PRODS.filter(p=>p.tipo==="capsula");
    for(const cp of caps) {
      const cant = form.cantidades[cp.id]||0;
      if(cant>0 && cant<cp.minimo){ showT("Minimo "+cp.minimo+" cajas de capsulas",false); return; }
    }
    const gan = esValle ? 0 : PRODS.reduce((a,p)=>a+(p.ganMayo*(form.cantidades[p.id]||0)),0);
    setPedidos(prev => [{...form, id:Date.now(), semana:sem, ganancia:gan}, ...prev]);
    setForm({punto:PUNTOS[0], cantidades:{}});
    setShowForm(false);
    showT("Pedido cafe guardado");
  };

  const cerrar = () => {
    const total = PRODS.reduce((a,p)=>a+consolid[p.id],0);
    if(total===0){ showT("No hay pedidos de cafe",false); return; }
    let det = "";
    pedSem.forEach(p => {
      const lineas = PRODS.filter(prod=>p.cantidades[prod.id]>0).map(prod=>prod.nombre+": "+p.cantidades[prod.id]);
      if(lineas.length>0) det += "\n"+p.punto.toUpperCase()+"\n"+lineas.join("\n")+"\n";
    });
    const tots = "\nTOTAL:\n"+PRODS.filter(p=>consolid[p.id]>0).map(p=>"- "+p.nombre+": "+consolid[p.id]).join("\n");
    const msg = "Pedido CHERRYSEASON\n"+det+tots+"\n\nGracias!";
    window.open("https://wa.me/5493513128283?text="+encodeURIComponent(msg),"_blank");
    showT("Pedido enviado a Cherry Season");
  };

  const btnS = (bg,extra={}) => ({padding:"11px 0",borderRadius:12,border:"none",background:bg,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:"bold",...extra});
  const rowS = {display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,background:C.bg,borderRadius:10,padding:"10px 12px",border:"1px solid "+C.border};

  return (
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",paddingBottom:20,fontFamily:"'Lato',sans-serif"}}>

      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:toast.ok?C.verde:"#C0444A",color:"#fff",padding:"11px 26px",borderRadius:30,fontSize:13,fontWeight:"bold",zIndex:999,whiteSpace:"nowrap"}}>{toast.msg}</div>}

      {/* Header */}
      <div style={{background:"#8B2010",padding:"24px 16px",textAlign:"center"}}>
        <div style={{fontSize:9,letterSpacing:4,color:"rgba(255,255,255,0.6)",textTransform:"uppercase",marginBottom:4}}>Cafe de Especialidad</div>
        <div style={{fontSize:28,fontWeight:"bold",color:"#fff",letterSpacing:3}}>CHERRYSEASON</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:4}}>Panel de Control — {new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}</div>
      </div>

      <div style={{padding:"0 14px"}}>

        {/* Botones principales */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:16,marginBottom:16}}>
          <button onClick={()=>setShowForm(v=>!v)} style={btnS(C.rojo)}>{showForm?"Cerrar":"+ Cargar pedido"}</button>
          <button onClick={cerrar} style={btnS(C.marron)}>Cerrar pedido</button>
        </div>

        {/* Consolidado */}
        <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:14,border:"1px solid "+C.rojoLight}}>
          <div style={{fontSize:11,color:C.rojo,letterSpacing:2,textTransform:"uppercase",marginBottom:12,fontWeight:"bold"}}>Consolidado — {sem}</div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:10,color:C.marronLight,fontWeight:"bold",textTransform:"uppercase",marginBottom:6}}>Cafe en grano</div>
            {PRODS.filter(p=>p.tipo==="grano").map(p=>(
              <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #F5E5E0"}}>
                <span style={{fontSize:12,color:C.marronLight}}>{p.nombre}</span>
                <span style={{fontWeight:"bold",color:consolid[p.id]>0?C.marron:"#E8C5C0"}}>{consolid[p.id]} u.</span>
              </div>
            ))}
          </div>
          <div>
            <div style={{fontSize:10,color:C.marronLight,fontWeight:"bold",textTransform:"uppercase",marginBottom:6,marginTop:8}}>Capsulas</div>
            {PRODS.filter(p=>p.tipo==="capsula").map(p=>(
              <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #F5E5E0"}}>
                <span style={{fontSize:12,color:C.marronLight}}>{p.nombre}</span>
                <span style={{fontWeight:"bold",color:consolid[p.id]>0?C.marron:"#E8C5C0"}}>{consolid[p.id]} u.</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:10,paddingTop:8,borderTop:"1px solid #E8C5C0"}}>
            <span style={{fontSize:12,color:C.marronLight}}>{pedSem.length} puntos cargados</span>
            <span style={{fontSize:13,color:C.verde,fontWeight:"bold"}}>Gan: {fmt(ganSem)}</span>
          </div>
          {invValle>0&&<div style={{display:"flex",justifyContent:"space-between",marginTop:6,background:C.rojoBg,borderRadius:8,padding:"6px 10px"}}>
            <span style={{fontSize:11,color:C.marronLight}}>Inversion Valle Escondido:</span>
            <span style={{fontSize:12,color:C.rojo,fontWeight:"bold"}}>{fmt(invValle)}</span>
          </div>}
        </div>

        {/* Formulario */}
        {showForm&&<div style={{background:C.card,borderRadius:16,padding:16,marginBottom:14,border:"1px solid "+C.rojoLight}}>
          <div style={{fontSize:11,color:C.rojo,letterSpacing:2,textTransform:"uppercase",marginBottom:12,fontWeight:"bold"}}>Cargar pedido</div>

          <div style={{fontSize:12,color:C.marronLight,marginBottom:6}}>Punto de venta</div>
          <select value={form.punto} onChange={e=>setForm(f=>({...f,punto:e.target.value}))}
            style={{width:"100%",padding:"11px 13px",borderRadius:10,background:"#FFF8F5",border:"1px solid "+C.border,color:C.marron,fontSize:13,marginBottom:14,boxSizing:"border-box"}}>
            {PUNTOS.map(p=><option key={p} value={p}>{p}</option>)}
          </select>

          <div style={{fontSize:10,color:C.marronLight,fontWeight:"bold",textTransform:"uppercase",marginBottom:8}}>Cafe en grano</div>
          {PRODS.filter(p=>p.tipo==="grano").map(prod=>{
            const precio = esValle ? prod.costoValle : prod.precioMayo;
            const cant = form.cantidades[prod.id]||0;
            return <div key={prod.id} style={rowS}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:"bold",color:C.marron}}>{prod.nombre}</div>
                <div style={{fontSize:10,color:C.marronLight}}>{esValle?fmt(precio)+" (costo)":fmt(precio)}</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={()=>setCant(prod.id,-1)} style={{width:32,height:32,borderRadius:8,border:"1px solid "+C.border,background:"#fff",color:C.marron,fontSize:16,cursor:"pointer",fontWeight:"bold"}}>-</button>
                <span style={{width:24,textAlign:"center",fontSize:18,fontWeight:"bold",color:C.marron}}>{cant}</span>
                <button onClick={()=>setCant(prod.id,1)} style={{width:32,height:32,borderRadius:8,border:"none",background:C.rojo,color:"#fff",fontSize:16,cursor:"pointer",fontWeight:"bold"}}>+</button>
              </div>
              <span style={{fontSize:11,color:C.naranja,width:70,textAlign:"right",fontWeight:"bold"}}>{fmt(precio*cant)}</span>
            </div>;
          })}

          <div style={{fontSize:10,color:C.marronLight,fontWeight:"bold",textTransform:"uppercase",marginBottom:8,marginTop:8}}>Capsulas (min. 6 cajas)</div>
          {PRODS.filter(p=>p.tipo==="capsula").map(prod=>{
            const precio = esValle ? prod.costoValle : prod.precioMayo;
            const cant = form.cantidades[prod.id]||0;
            return <div key={prod.id} style={rowS}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:"bold",color:C.marron}}>{prod.nombre}</div>
                <div style={{fontSize:10,color:C.marronLight}}>{esValle?fmt(precio)+" (costo)":fmt(precio)+" min 6"}</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={()=>setCant(prod.id,-1)} style={{width:32,height:32,borderRadius:8,border:"1px solid "+C.border,background:"#fff",color:C.marron,fontSize:16,cursor:"pointer",fontWeight:"bold"}}>-</button>
                <span style={{width:24,textAlign:"center",fontSize:18,fontWeight:"bold",color:C.marron}}>{cant}</span>
                <button onClick={()=>setCant(prod.id,1)} style={{width:32,height:32,borderRadius:8,border:"none",background:C.rojo,color:"#fff",fontSize:16,cursor:"pointer",fontWeight:"bold"}}>+</button>
              </div>
              <span style={{fontSize:11,color:C.naranja,width:70,textAlign:"right",fontWeight:"bold"}}>{fmt(precio*cant)}</span>
            </div>;
          })}

          <div style={{background:C.rojoBg,borderRadius:12,padding:12,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
              <span style={{color:C.marronLight}}>Total del pedido:</span>
              <span style={{fontWeight:"bold",color:C.naranja}}>{fmt(PRODS.reduce((a,p)=>{
                const precio = esValle?p.costoValle:p.precioMayo;
                return a+(precio*(form.cantidades[p.id]||0));
              },0))}</span>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <button onClick={()=>setShowForm(false)} style={{padding:13,borderRadius:12,border:"1px solid "+C.border,background:"transparent",color:C.marronLight,cursor:"pointer",fontSize:13}}>Cancelar</button>
            <button onClick={agregar} style={{padding:13,borderRadius:12,border:"none",background:C.rojo,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:"bold"}}>Guardar</button>
          </div>
        </div>}

        {/* Lista pedidos */}
        {pedidos.length===0&&!showForm&&<div style={{textAlign:"center",padding:50,color:C.rojoLight}}>
          <div style={{fontSize:48,marginBottom:12}}>CS</div>
          <div style={{fontSize:14,color:C.marronLight}}>No hay pedidos de cafe esta semana</div>
        </div>}

        {pedidos.map(p=>(
          <div key={p.id} style={{background:C.card,borderRadius:14,padding:14,marginBottom:10,border:"1px solid "+C.rojoLight}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <div>
                <div style={{fontWeight:"bold",fontSize:14,color:C.marron}}>{p.punto}</div>
                <div style={{fontSize:11,color:C.marronLight,marginTop:4}}>
                  {PRODS.filter(prod=>p.cantidades[prod.id]>0).map(prod=>prod.nombre+": "+p.cantidades[prod.id]).join(" / ")}
                </div>
                <div style={{fontSize:10,color:"#E8A0A8",marginTop:2}}>{p.semana}</div>
              </div>
              <div style={{textAlign:"right"}}>
                {p.ganancia>0&&<div style={{fontSize:13,color:C.verde,fontWeight:"bold"}}>+{fmt(p.ganancia)}</div>}
                {p.ganancia===0&&<div style={{fontSize:11,color:C.marronLight}}>Valle Escondido</div>}
              </div>
            </div>
          </div>
        ))}

        {/* Link de vuelta al panel */}
        <div style={{textAlign:"center",marginTop:20}}>
          <a href="panel-rogeles.html" style={{fontSize:12,color:C.marronLight,textDecoration:"none",borderBottom:"1px solid "+C.border,paddingBottom:2}}>
            Volver al panel de rogeles
          </a>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
