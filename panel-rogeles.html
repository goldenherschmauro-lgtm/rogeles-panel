function App() {

  const [peds,setPeds]=useState([]);
  const [svf,setSvf]=useState(false);
  const [spf,setSpf]=useState(false);
  const [vf,setVf]=useState({tipo:"minorista",cliente:"",celular:"",tamano:"Entero",cantidad:1,retira:"",pagado:false,fecha:new Date().toLocaleDateString("es-AR")});
  const [pf,setPf]=useState({punto:PUNTOS[0],Entero:0,Medio:0,Cuarto:0,Rogelito:0});
  const [toast,setToast]=useState(null);
  const [rv,setRv]=useState({Entero:0,Medio:0,Cuarto:0,Rogelito:0});
  const [anioVista,setAnioVista]=useState("2026");
  const [pedsCafe,setPedsCafe]=useState(loadCafe());
  const [showCafe,setShowCafe]=useState(false);
  const [cafeForm,setCafeForm]=useState({punto:PUNTOS[0],cantidades:{}});


  useEffect(()=>{ const d=ld(); if(d){if(d.stock)setStock(d.stock);if(d.ventas)setVentas(d.ventas);if(d.peds)setPeds(d.peds);} },[]);
  useEffect(()=>{ sd({stock,ventas,peds}); },[stock,ventas,peds]);
  useEffect(()=>{ saveCafe(pedsCafe); },[pedsCafe]);

  // Cargar pedidos mayoristas desde Google Sheets
  useEffect(()=>{
    const getSem = () => { const d=new Date(); const s=new Date(d.getFullYear(),0,1); return `Sem ${Math.ceil(((d-s)/86400000+s.getDay()+1)/7)} / ${d.getFullYear()}`; };
    const sem = getSem();
    fetch(SHEETS_URL + "?t=" + Date.now())
      .then(r=>r.json())
      .then(res=>{
        if(res.ok && res.data){
          const pedidos = res.data
            .filter(r => r.punto && r.semana)
            .map((r,i) => ({
              id: i + 1,
              punto: r.punto,
              contacto: r.contacto,
              semana: r.semana,
              fecha: r.fecha,
              Entero: parseInt(r.entero)||0,
              Medio: parseInt(r.medio)||0,
              Cuarto: parseInt(r.cuarto)||0,
              Rogelito: parseInt(r.rogelito)||0,
              ganancia: (parseInt(r.entero)||0)*8890 + (parseInt(r.medio)||0)*5950 + (parseInt(r.cuarto)||0)*3830 + (parseInt(r.rogelito)||0)*2960,
            }));
          if(pedidos.length > 0) setPeds(pedidos);
        }
      })
      .catch(()=>{});
  },[]);

  const toast2=(msg,ok=true)=>{ setToast({msg,ok}); setTimeout(()=>setToast(null),2500); };
  const pv=(t,tipo)=>tipo==="minorista"?PM[t]:PMay[t];
  const gan=(t,tipo,c)=>(tipo==="minorista"?GM[t]:GMay[t])*c;
  const gsem=()=>{
    const d=new Date();
    const day=d.getDay(); // 0=dom,1=lun...6=sab
    const diffLun=day===0?-6:1-day;
    const lun=new Date(d); lun.setDate(d.getDate()+diffLun);
    const dom=new Date(lun); dom.setDate(lun.getDate()+6);
    const fmt2=x=>x.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});
    return "Pedido semanal " + fmt2(lun) + " - " + fmt2(dom);
  };
  const sem=gsem();
  const getMes = () => { const d=new Date(); return `${d.getMonth()+1}-${d.getFullYear()}`; };
  const mes = getMes();
  const pend=ventas.filter(v=>!v.pagado);
  const hoy=ventas.filter(v=>v.fecha===new Date().toLocaleDateString("es-AR"));
  const caja=ventas.filter(v=>v.pagado).reduce((a,v)=>a+v.precio,0);

        </div>}

      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.nav,borderTop:`1px solid ${C.border}`,display:"flex",padding:"10px 0 14px",zIndex:100,boxShadow:"0 -4px 20px rgba(196,104,122,0.12)"}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"4px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:18,color:tab===t.id?C.rosa:C.crema}}>{t.icon}</span><span style={{fontSize:10,color:tab===t.id?C.rosa:C.marronLight,fontWeight:tab===t.id?"bold":"normal"}}>{t.label}</span>{tab===t.id&&<div style={{width:24,height:2.5,background:C.rosa,borderRadius:2}}/>}</button>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
